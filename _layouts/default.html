<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>

  <!-- Global Stylesheet -->
  <link rel="stylesheet" href="/assets/css/main.css">

  <!-- Section-specific class injection -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="{{ page.section | default: 'root' }}">

  <!-- Global Navigation -->
  {% include nav.html %}

  <!-- Floating Personality Button -->
  <div class="personality-floating-btn" title="Personality Settings">😏</div>

  <main class="page-main">

    <!-- Breadcrumb Trail -->
    {% include breadcrumb.html %}

    <!-- Section Menu (if defined in front matter) -->
    {% include section-menu.html %}

    <!-- Page Content -->
    <section class="page-content">
      {{ content }}
    </section>

  </main>

  <!-- Global Footer -->
  {% include footer.html %}

  <!-- Personality Control Panel -->
  <div id="personality-panel">
    <h3>Personality Settings</h3>

    <label>
      Region:
      <select id="region-select">
        <option value="glasgow">Glasgow (Default)</option>
        <option value="scouse">Scouse</option>
        <option value="manc">Manc</option>
        <option value="yorkshire">Yorkshire</option>
        <option value="london">London</option>
      </select>
    </label>

    <label>
      <input type="checkbox" id="chaos-toggle">
      Chaos Mode
    </label>

    <label>
      <input type="checkbox" id="deadpan-toggle">
      Deadpan Mode
    </label>

    <label>
      <input type="checkbox" id="sassmax-toggle" checked>
      Sass To The Max
    </label>

    <label>
      <input type="checkbox" id="drunk-toggle">
      Drunk Mode (After Hours)
    </label>

    <div class="close-btn">Close</div>
  </div>

  <!-- Personality Engine -->
  <script src="/assets/js/personality.js"></script>

</body>
</html>
